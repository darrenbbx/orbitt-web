<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBITT — Members</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #020080;
  --white-10: rgba(255,255,255,0.1);
  --white-20: rgba(255,255,255,0.2);
  --white-40: rgba(255,255,255,0.4);
  --white-60: rgba(255,255,255,0.6);
  --accent: #ff3366;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; background: var(--blue); color: white; font-family: 'Noto Sans JP', sans-serif; }

/* ── ログイン ── */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 32px; }
.login-logo { font-family: 'Space Mono', monospace; font-size: 32px; letter-spacing: 6px; }
.login-box { background: rgba(255,255,255,0.06); border: 1px solid var(--white-10); border-radius: 16px; padding: 32px; width: 320px; display: flex; flex-direction: column; gap: 16px; }
.login-box p { font-size: 13px; color: var(--white-60); text-align: center; }
.login-box input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid var(--white-20); border-radius: 8px; padding: 12px 16px; color: white; font-size: 14px; font-family: 'Space Mono', monospace; letter-spacing: 2px; outline: none; }
.login-box input:focus { border-color: var(--white-40); }
.login-box button { width: 100%; background: white; color: var(--blue); border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Space Mono', monospace; letter-spacing: 1px; transition: background 0.2s; }
.login-box button:hover { background: #eee; }
.login-box button:disabled { opacity: 0.5; cursor: not-allowed; }
.login-err { font-size: 12px; color: var(--accent); text-align: center; display: none; }

#site { display: none; }
.inner { max-width: 960px; margin: 0 auto; width: 100%; }

/* ── ヘッダー ── */
header { position: sticky; top: 0; z-index: 100; background: rgba(2,0,128,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--white-10); padding: 14px 32px; }
header .inner { display: flex; align-items: center; gap: 32px; }
.logo { font-family: 'Space Mono', monospace; font-size: 16px; letter-spacing: 4px; margin-right: auto; }
.nav-btn { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 2px; color: var(--white-40); background: none; border: none; cursor: pointer; padding: 6px 0; border-bottom: 2px solid transparent; transition: all 0.2s; }
.nav-btn:hover { color: white; }
.nav-btn.active { color: white; border-bottom-color: white; }
.member-badge { font-size: 11px; background: var(--white-10); border: 1px solid var(--white-20); padding: 4px 12px; border-radius: 20px; color: var(--white-60); font-family: 'Space Mono', monospace; }

/* ── バナー ── */
.banner { width: 100%; height: 56px; background: linear-gradient(135deg, #010060 0%, #0a00aa 60%, #010060 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.banner::before { content: 'ORBITT'; font-family: 'Space Mono', monospace; font-size: 40px; color: rgba(255,255,255,0.04); letter-spacing: 12px; position: absolute; }
.banner-text { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--white-40); position: relative; }

/* ── プロフィール ── */
.profile-row { padding: 0 32px; display: flex; align-items: center; gap: 16px; margin-top: 16px; margin-bottom: 24px; max-width: 960px; margin-left: auto; margin-right: auto; }
.avatar { width: 56px; height: 56px; border-radius: 50%; background: #2200ff; border: 3px solid var(--blue); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 18px; }
.profile-name { font-size: 16px; font-weight: 500; padding-bottom: 4px; }
.profile-sub { font-size: 12px; color: var(--white-40); font-family: 'Space Mono', monospace; letter-spacing: 1px; }

/* ── レイアウト ── */
.layout { display: flex; gap: 24px; padding: 0 32px 60px; align-items: flex-start; max-width: 960px; margin: 0 auto; }
.feed { flex: 1; min-width: 0; }
.sidebar { width: 220px; flex-shrink: 0; position: sticky; top: 80px; }

/* ── 投稿カード ── */
.post-card { background: rgba(255,255,255,0.05); border: 1px solid var(--white-10); border-radius: 14px; padding: 20px; margin-bottom: 16px; transition: border-color 0.2s, background 0.2s, transform 0.15s; cursor: pointer; user-select: none; }
.post-card:hover { border-color: var(--white-40); background: rgba(255,255,255,0.08); transform: translateY(-2px); }
.post-card:active { transform: translateY(0); }
.post-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.post-av { width: 32px; height: 32px; border-radius: 50%; background: #2200ff; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 12px; flex-shrink: 0; }
.post-name { font-size: 13px; font-weight: 500; }
.post-date { font-size: 11px; color: var(--white-40); font-family: 'Space Mono', monospace; }
.post-type { margin-left: auto; font-size: 10px; font-family: 'Space Mono', monospace; background: var(--white-10); color: var(--white-60); padding: 3px 10px; border-radius: 20px; letter-spacing: 1px; }
.post-title { font-size: 15px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
.post-preview { font-size: 13px; color: var(--white-40); line-height: 1.6; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.video-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'Space Mono', monospace; color: var(--white-60); background: rgba(255,255,255,0.08); border: 1px solid var(--white-20); border-radius: 20px; padding: 4px 12px; margin-bottom: 12px; }
.play-dot { width: 6px; height: 6px; background: #ff3366; border-radius: 50%; }
.post-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--white-10); font-size: 11px; color: var(--white-40); font-family: 'Space Mono', monospace; }
.comment-count-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--white-40); font-family: 'Space Mono', monospace; }
.comment-count-badge.has-comments { color: rgba(255,255,255,0.7); }
.read-more { font-size: 11px; color: var(--white-60); font-family: 'Space Mono', monospace; letter-spacing: 1px; }

/* ── サイドバー ── */
.sb-card { background: rgba(255,255,255,0.05); border: 1px solid var(--white-10); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.sb-label { font-size: 10px; font-family: 'Space Mono', monospace; letter-spacing: 2px; color: var(--white-40); margin-bottom: 12px; text-transform: uppercase; }
.sb-plan { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.plan-dot { width: 8px; height: 8px; background: #44ff88; border-radius: 50%; }
.sb-stat { font-size: 28px; font-family: 'Space Mono', monospace; font-weight: 700; }
.sb-stat-sub { font-size: 11px; color: var(--white-40); margin-top: 4px; font-family: 'Space Mono', monospace; }
.notion-link { font-size: 11px; color: var(--white-40); text-align: center; display: block; margin-top: 8px; font-family: 'Space Mono', monospace; text-decoration: none; }
.notion-link:hover { color: white; }

/* ── ローディング ── */
.loading { text-align: center; padding: 60px 20px; color: var(--white-40); font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 2px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--white-10); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── モーダル ── */
.modal-overlay { position: fixed; inset: 0; z-index: 200; background: var(--blue); display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s; overflow-y: auto; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-topbar { position: sticky; top: 0; z-index: 10; background: rgba(2,0,128,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--white-10); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.modal-back-btn { display: flex; align-items: center; gap: 8px; background: var(--white-10); border: 1px solid var(--white-20); border-radius: 8px; padding: 6px 14px; color: var(--white-60); font-size: 12px; cursor: pointer; font-family: 'Space Mono', monospace; letter-spacing: 1px; transition: all 0.2s; }
.modal-back-btn:hover { background: var(--white-20); color: white; }
.modal-topbar-logo { font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 4px; color: var(--white-40); margin-left: auto; }
.modal { width: 100%; max-width: 720px; margin: 0 auto; padding: 48px 32px 80px; transform: translateY(20px); transition: transform 0.3s; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
.modal-av { width: 40px; height: 40px; border-radius: 50%; background: #2200ff; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 14px; flex-shrink: 0; }
.modal-name { font-size: 14px; font-weight: 500; }
.modal-date { font-size: 11px; color: var(--white-40); font-family: 'Space Mono', monospace; margin-top: 2px; }
.modal-type { margin-left: auto; font-size: 10px; font-family: 'Space Mono', monospace; background: var(--white-10); color: var(--white-60); padding: 4px 12px; border-radius: 20px; letter-spacing: 1px; }
.modal-title { font-size: 26px; font-weight: 500; line-height: 1.4; margin-bottom: 20px; letter-spacing: -0.3px; }
.modal-divider { height: 1px; background: var(--white-10); margin-bottom: 24px; }
.modal-body { font-size: 15px; color: var(--white-60); line-height: 1.9; margin-bottom: 28px; }
.modal-body b { font-weight: 700; color: white; }
.modal-body em { font-style: italic; }
.modal-body u { text-decoration: underline; text-underline-offset: 3px; }
.modal-body s { text-decoration: line-through; }
.modal-body code { font-family: 'Space Mono', monospace; font-size: 12px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: #aef; }
.modal-body .notion-color-red { color: #ff7979; }
.modal-body .notion-color-orange { color: #ffaa55; }
.modal-body .notion-color-yellow { color: #ffe066; }
.modal-body .notion-color-green { color: #66ffaa; }
.modal-body .notion-color-blue { color: #66aaff; }
.modal-body .notion-color-purple { color: #cc88ff; }
.modal-body .notion-color-pink { color: #ff88cc; }
.modal-body .notion-color-gray { color: rgba(255,255,255,0.4); }
.modal-video-link { display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--white-20); border-radius: 14px; padding: 16px 20px; color: white; text-decoration: none; font-size: 14px; transition: background 0.2s; margin-bottom: 24px; }
.modal-video-link:hover { background: rgba(255,255,255,0.1); }
.modal-play-icon { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.modal-notion-btn { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--white-20); border-radius: 10px; padding: 10px 22px; font-size: 12px; font-family: 'Space Mono', monospace; color: var(--white-60); text-decoration: none; transition: all 0.2s; margin-top: 8px; }
.modal-notion-btn:hover { border-color: white; color: white; }

/* ── 写真 ── */
.post-image { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 12px; background: rgba(255,255,255,0.05); aspect-ratio: 16/9; position: relative; }
.post-image img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 10px; transition: transform 0.3s ease; }
.post-card:hover .post-image img { transform: scale(1.03); }
.post-image-count { position: absolute; bottom: 8px; right: 10px; font-size: 10px; font-family: 'Space Mono', monospace; color: white; background: rgba(0,0,0,0.55); padding: 2px 8px; border-radius: 20px; letter-spacing: 1px; }
.modal-images { display: grid; gap: 8px; margin-bottom: 20px; border-radius: 12px; overflow: hidden; }
.modal-images.count-1 { grid-template-columns: 1fr; }
.modal-images.count-2 { grid-template-columns: 1fr 1fr; }
.modal-images.count-3 { grid-template-columns: 1fr 1fr; }
.modal-images.count-3 .modal-img-wrap:first-child { grid-column: 1 / -1; }
.modal-images.count-many { grid-template-columns: 1fr 1fr; }
.modal-img-wrap { overflow: hidden; border-radius: 8px; background: rgba(255,255,255,0.06); aspect-ratio: 4/3; cursor: zoom-in; }
.modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
.modal-img-wrap:hover img { transform: scale(1.04); }

/* ── ライトボックス ── */
.lightbox { position: fixed; inset: 0; z-index: 400; background: rgba(0,0,10,0.93); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.lightbox.open { opacity: 1; pointer-events: all; }
.lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 10px; object-fit: contain; box-shadow: 0 20px 80px rgba(0,0,0,0.8); }
.lightbox-close { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.12); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.lightbox-close:hover { background: rgba(255,255,255,0.25); }
.lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.12); border: none; color: white; font-size: 22px; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.lightbox-nav:hover { background: rgba(255,255,255,0.25); }
.lightbox-prev { left: 20px; }
.lightbox-next { right: 20px; }
.lightbox-counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255,255,255,0.5); font-family: 'Space Mono', monospace; letter-spacing: 2px; }

/* ── 投稿コメント ── */
.comments-section { margin-top: 40px; border-top: 1px solid var(--white-10); padding-top: 32px; }
.comments-title { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--white-40); text-transform: uppercase; margin-bottom: 20px; }
.comments-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
.comment-item { background: rgba(255,255,255,0.04); border: 1px solid var(--white-10); border-radius: 12px; padding: 14px 16px; transition: border-color 0.2s; }
.comment-item:hover { border-color: var(--white-20); }
.comment-item.is-new { border-color: rgba(255,255,255,0.25); animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.comment-av { width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 10px; flex-shrink: 0; }
.comment-name { font-size: 13px; font-weight: 500; }
.comment-ts { font-size: 11px; color: var(--white-40); font-family: 'Space Mono', monospace; margin-left: auto; }
.comment-body { font-size: 13px; color: var(--white-60); line-height: 1.7; white-space: pre-line; }
.comments-empty { font-size: 12px; color: var(--white-40); font-family: 'Space Mono', monospace; padding: 16px 0; letter-spacing: 1px; }
.comments-loading { font-size: 12px; color: var(--white-40); font-family: 'Space Mono', monospace; padding: 16px 0; letter-spacing: 1px; }
.comment-form { background: rgba(255,255,255,0.04); border: 1px solid var(--white-10); border-radius: 14px; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
.comment-form input, .comment-form textarea { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid var(--white-20); border-radius: 8px; padding: 10px 14px; color: white; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; resize: vertical; }
.comment-form input::placeholder, .comment-form textarea::placeholder { color: var(--white-40); }
.comment-form input:focus, .comment-form textarea:focus { border-color: var(--white-40); }
.comment-form textarea { min-height: 72px; }
.comment-form-row { display: flex; align-items: center; gap: 10px; }
.comment-form-row input { flex: 1; }
.comment-submit { background: white; color: var(--blue); border: none; border-radius: 8px; padding: 9px 20px; font-size: 12px; font-family: 'Space Mono', monospace; font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: background 0.2s; white-space: nowrap; flex-shrink: 0; }
.comment-submit:hover { background: #ddd; }
.comment-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.rate-limit-msg { font-size: 11px; color: var(--accent); font-family: 'Space Mono', monospace; display: none; margin-top: 4px; }

/* ── BBS ── */
#bbs-page { display: none; max-width: 720px; margin: 0 auto; padding: 40px 32px 80px; }
.bbs-header { margin-bottom: 28px; }
.bbs-header-title { font-family: 'Space Mono', monospace; font-size: 18px; letter-spacing: 4px; font-weight: 700; margin-bottom: 6px; }
.bbs-header-sub { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--white-40); }

/* フォーム */
.bbs-form { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); border-radius: 16px; padding: 24px; margin-bottom: 40px; display: flex; flex-direction: column; gap: 14px; }
.bbs-form-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--white-40); text-transform: uppercase; margin-bottom: -4px; }
.bbs-form input[type="text"], .bbs-form textarea { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 10px; padding: 12px 16px; color: white; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; outline: none; resize: vertical; transition: border-color 0.2s; }
.bbs-form input[type="text"]::placeholder, .bbs-form textarea::placeholder { color: var(--white-40); }
.bbs-form input[type="text"]:focus, .bbs-form textarea:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); }
.bbs-form textarea { min-height: 100px; }
.bbs-form-bottom { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.bbs-form-bottom input { flex: 1; min-width: 160px; }
.bbs-submit { background: white; color: var(--blue); border: none; border-radius: 10px; padding: 12px 28px; font-size: 13px; font-family: 'Space Mono', monospace; font-weight: 700; cursor: pointer; letter-spacing: 2px; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
.bbs-submit:hover { background: #eee; transform: translateY(-1px); }
.bbs-submit:active { transform: translateY(0); }
.bbs-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.bbs-rate-limit { font-size: 11px; color: var(--accent); font-family: 'Space Mono', monospace; display: none; width: 100%; }

/* 投稿リスト */
.bbs-section-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--white-40); margin-bottom: 16px; text-transform: uppercase; }
.bbs-list { display: flex; flex-direction: column; gap: 0; }
.bbs-item { border-bottom: 1px solid var(--white-10); padding: 20px 4px; }
.bbs-item:first-child { border-top: 1px solid var(--white-10); }
.bbs-item.is-new { animation: fadeIn 0.4s ease; background: rgba(255,255,255,0.03); border-radius: 8px; }
.bbs-item-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
.bbs-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--white-40); flex-shrink: 0; }
.bbs-item-title { font-size: 15px; font-weight: 500; flex: 1; }
.bbs-meta { display: flex; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
.bbs-meta-item { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--white-40); }
.bbs-meta-item span { color: rgba(255,255,255,0.7); margin-left: 4px; }
.bbs-msg { font-size: 14px; color: var(--white-60); line-height: 1.8; white-space: pre-line; }
.bbs-empty { font-size: 12px; color: var(--white-40); font-family: 'Space Mono', monospace; padding: 60px 0; text-align: center; letter-spacing: 1px; }
.bbs-loading { font-size: 12px; color: var(--white-40); font-family: 'Space Mono', monospace; padding: 60px 0; text-align: center; letter-spacing: 2px; }

@media (max-width: 680px) {
  .layout { flex-direction: column; padding: 0 16px 40px; }
  .sidebar { width: 100%; position: static; }
  header { padding: 14px 16px; }
  .profile-row { padding: 0 16px; }
  .modal { padding: 32px 20px 60px; }
  .modal-title { font-size: 20px; }
  .modal-topbar { padding: 10px 16px; }
  #bbs-page { padding: 24px 16px 60px; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">ORBITT</div>
  <div class="login-box">
    <p>メンバー限定ページ</p>
    <input type="password" id="pw-input" placeholder="パスワードを入力" />
    <div class="login-err" id="login-err">パスワードが違います</div>
    <button id="login-btn" onclick="tryLogin()">入る</button>
  </div>
</div>

<div id="site">
  <header>
    <div class="inner">
      <div class="logo">ORBITT</div>
      <button class="nav-btn active" id="nav-posts" onclick="showPage('posts')">POSTS</button>
      <button class="nav-btn" id="nav-bbs" onclick="showPage('bbs')">BBS</button>
      <div class="member-badge">MEMBER</div>
    </div>
  </header>

  <!-- POSTS PAGE -->
  <div id="posts-page">
    <div class="banner">

<script type="module">

import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBW0fUMMA1k6lQ2gfadFTUZ6dfgf4bZ8bM",
  authDomain: "orbitt-web.firebaseapp.com",
  projectId: "orbitt-web",
  storageBucket: "orbitt-web.firebasestorage.app",
  messagingSenderId: "430890162329",
  appId: "1:430890162329:web:0fa9bae1938df2be27c008",

};

const app = initializeApp(firebaseConfig);

window._db = db;

<script>
// ── 状態 ──
let allPosts = [];
let currentPostId = null;
let unsubscribeComments = null;
let commentCounts = {};
let lastCommentTime = 0;
let lastBbsTime = 0;
const RATE_LIMIT_MS = 30000;

// ── ページ切り替え ──
function showPage(page) {
  document.getElementById('posts-page').style.display = page === 'posts' ? 'block' : 'none';
  document.getElementById('bbs-page').style.display = page === 'bbs' ? 'block' : 'none';
  document.getElementById('nav-posts').classList.toggle('active', page === 'posts');
  document.getElementById('nav-bbs').classList.toggle('active', page === 'bbs');
  if (page === 'bbs') initBbs();
}

// ── ログイン維持 ──
function isLoggedIn() {
  return sessionStorage.getItem('orbitt_auth') === 'ok';
}

if (isLoggedIn()) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('site').style.display = 'block';
  loadPosts();
}

// ── パスワード認証 ──
async function tryLogin() {
  const val = document.getElementById('pw-input').value;
  if (!val) return;
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = '...';

  try {
    const res = await fetch('/.netlify/functions/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: val })
    });
    const data = await res.json();
    if (data.ok) {
      sessionStorage.setItem('orbitt_auth', 'ok');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('site').style.display = 'block';
      loadPosts();
    } else {
      document.getElementById('login-err').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('login-err').textContent = '通信エラーが発生しました';
  } finally {
    btn.disabled = false;
    btn.textContent = '入る';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

// ── 投稿読み込み ──
async function loadPosts() {
  try {
    const res = await fetch('https://script.google.com/macros/s/AKfycbzHVZdRNV8OG3dZsI7fj28DkvsOiKPC9qseyvEMRDsbW40d-tvTXIwGsCWSbFgO88U9/exec');
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    allPosts = data.results || [];
    document.getElementById('post-count').textContent = allPosts.length;
    renderPosts(allPosts);
    loadAllCommentCounts();
  } catch (e) {
    document.getElementById('posts-container').innerHTML =
      `<div class="loading">⚠ 読み込みエラー<br><br><small>${e.message}</small></div>`;
  }
}

// ── コメント数 ──
function loadAllCommentCounts() {
  if (!window._firebaseReady) {
    window.addEventListener('firebaseReady', loadAllCommentCounts, { once: true });
    return;
  }
  window._onSnapshot(
    window._collection(window._db, 'comments'),
    (snapshot) => {
      commentCounts = {};
      snapshot.docs.forEach(doc => {
        const pid = doc.data().postId;
        if (pid) commentCounts[pid] = (commentCounts[pid] || 0) + 1;
      });
      updateCommentCountBadges();
    }
  );
}

function updateCommentCountBadges() {
  document.querySelectorAll('.comment-count-badge').forEach(el => {
    const postId = el.dataset.postid;
    const count = commentCounts[postId] || 0;
    el.textContent = count > 0 ? `💬 ${count}` : '💬 0';
    el.classList.toggle('has-comments', count > 0);
  });
}

// ── テキスト整形 ──
function richTextToHtml(richTexts) {
  if (!richTexts || !richTexts.length) return '';
  return richTexts.map(rt => {
    let text = rt.plain_text || '';
    text = text.split('\n').map(line => escHtml(line)).join('<br>');
    const ann = rt.annotations || {};
    if (ann.code) {
      text = `<code>${text}</code>`;
    } else {
      const color = ann.color;
      if (color && color !== 'default') {
        text = `<span class="notion-color-${color.replace('_background','')}">${text}</span>`;
      }
      if (ann.bold) text = `<b>${text}</b>`;
      if (ann.italic) text = `<em>${text}</em>`;
      if (ann.underline) text = `<u>${text}</u>`;
      if (ann.strikethrough) text = `<s>${text}</s>`;
    }
    if (rt.href) text = `<a href="${escHtml(rt.href)}" target="_blank" style="color:inherit;opacity:0.8;text-decoration:underline;">${text}</a>`;
    return text;
  }).join('');
}

function getPostData(post) {
  const props = post.properties;
  const title = props.Name?.title?.[0]?.plain_text || props.Title?.title?.[0]?.plain_text || '(無題)';
  const type = props.Type?.select?.name || props.種類?.select?.name || '';
  const bodyRichText = props.Text?.rich_text || props.Body?.rich_text || props.内容?.rich_text || [];
  const body = bodyRichText.map(rt => rt.plain_text || '').join('');
  const bodyHtml = richTextToHtml(bodyRichText);
  const videoUrl = props.VideoURL?.url || props.URL?.url || '';
  const notionUrl = post.url || '';
  const dateStr = props.Date?.date?.start || props.日付?.date?.start || '';
  const postDate = dateStr ? new Date(dateStr) : new Date(post.created_time);
  const isNew = (new Date() - postDate) / (1000*60*60*24) <= 3;
  const dateLabel = postDate.toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\//g,'.');
  const imageUrls = extractImageUrls(props);
  return { title, type, body, bodyHtml, videoUrl, notionUrl, dateLabel, isNew, imageUrls };
}

function extractImageUrls(props) {
  for (const key of ['Photo','Photos','Image','Images','Files','ファイル','画像','写真']) {
    const prop = props[key];
    if (prop?.type === 'files' && prop.files?.length) {
      return prop.files.map(f => f.file?.url || f.external?.url).filter(Boolean);
    }
  }
  return [];
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── カード描画 ──
function renderPosts(posts) {
  const container = document.getElementById('posts-container');
  if (!posts.length) {
    container.innerHTML = '<div class="loading">投稿がまだありません</div>';
    return;
  }
  container.innerHTML = posts.map((post, idx) => {
    const { title, type, body, videoUrl, dateLabel, isNew, imageUrls } = getPostData(post);
    const videoBadge = videoUrl ? `<div class="video-badge"><div class="play-dot"></div>動画あり</div>` : '';
    const previewText = body ? `<div class="post-preview">${escHtml(body)}</div>` : '';
    const imgPreview = imageUrls.length
      ? `<div class="post-image">
          <img src="${imageUrls[0]}" alt="${escHtml(title)}" loading="lazy" onerror="this.parentElement.style.display='none'">
          ${imageUrls.length > 1 ? `<div class="post-image-count">+${imageUrls.length}</div>` : ''}
        </div>` : '';
    const count = commentCounts[post.id] || 0;
    const countLabel = count > 0 ? `💬 ${count}` : '💬 0';
    return `
      <div class="post-card" data-type="${type}" onclick="openModal(${idx})">
        <div class="post-meta">
          <div class="post-av">R</div>
          <div>
            <div class="post-name">Riku ${isNew ? '<span style="font-size:10px;color:#ff3366;font-family:Space Mono,monospace;margin-left:6px">NEW</span>' : ''}</div>
            <div class="post-date">${dateLabel}</div>
          </div>
          ${type ? `<div class="post-type">${type}</div>` : ''}
        </div>
        ${imgPreview}
        <div class="post-title">${escHtml(title)}</div>
        ${videoBadge}
        ${previewText}
        <div class="post-footer">
          <span class="comment-count-badge ${count > 0 ? 'has-comments' : ''}" data-postid="${post.id}">${countLabel}</span>
          <span class="read-more">続きを読む →</span>
        </div>
      </div>`;
  }).join('');
}

// ── モーダル ──
function openModal(idx) {
  const post = allPosts[idx];
  if (!post) return;
  currentPostId = post.id;
  const { title, type, body, bodyHtml, videoUrl, notionUrl, dateLabel, isNew, imageUrls } = getPostData(post);

  const videoSection = videoUrl ? `
    <a href="${videoUrl}" target="_blank" class="modal-video-link">
      <div class="modal-play-icon">
        <svg width="13" height="15" viewBox="0 0 12 14" fill="none"><path d="M1 1L11 7L1 13V1Z" fill="#0a00cc"/></svg>
      </div>
      <span>動画を見る</span>
    </a>` : '';

  let imagesSection = '';
  if (imageUrls.length) {
    const countClass = imageUrls.length === 1 ? 'count-1' : imageUrls.length === 2 ? 'count-2' : imageUrls.length === 3 ? 'count-3' : 'count-many';
    imagesSection = `<div class="modal-images ${countClass}">${
      imageUrls.slice(0,4).map((url, i) =>
        `<div class="modal-img-wrap" onclick="openLightbox(event,${idx},${i})">
          <img src="${url}" alt="写真${i+1}" loading="lazy" onerror="this.parentElement.style.display='none'">
        </div>`).join('')
    }</div>`;
  }

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-meta">
      <div class="modal-av">R</div>
      <div>
        <div class="modal-name">Riku ${isNew ? '<span style="font-size:10px;color:#ff3366;font-family:Space Mono,monospace;margin-left:6px">NEW</span>' : ''}</div>
        <div class="modal-date">${dateLabel}</div>
      </div>
      ${type ? `<div class="modal-type">${type}</div>` : ''}
    </div>
    <div class="modal-title">${escHtml(title)}</div>
    <div class="modal-divider"></div>
    ${imagesSection}
    ${body ? `<div class="modal-body">${bodyHtml}</div>` : ''}
    ${videoSection}
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-overlay').scrollTop = 0;
  document.body.style.overflow = 'hidden';
  document.getElementById('comments-list').innerHTML = '<div class="comments-loading">読み込み中...</div>';
  document.getElementById('comment-msg').value = '';
  document.getElementById('rate-limit-msg').style.display = 'none';
  loadComments(post.id);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentPostId = null;
  if (unsubscribeComments) { unsubscribeComments(); unsubscribeComments = null; }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── コメント読み込み ──
function loadComments(postId) {
  if (!window._firebaseReady) {
    window.addEventListener('firebaseReady', () => loadComments(postId), { once: true });
    return;
  }
  if (unsubscribeComments) { unsubscribeComments(); unsubscribeComments = null; }

  const q = window._query(
    window._collection(window._db, 'comments'),
    window._where('postId', '==', postId)
  );

  let prevCount = -1;
  unsubscribeComments = window._onSnapshot(q, (snapshot) => {
    const list = document.getElementById('comments-list');
    if (!list) return;

    if (snapshot.empty) {
      list.innerHTML = '<div class="comments-empty">まだコメントがありません。最初に書いてみよう！</div>';
      prevCount = 0;
      return;
    }

    const docs = snapshot.docs.slice().sort((a, b) => {
      const ta = a.data().createdAt?.toMillis?.() || 0;
      const tb = b.data().createdAt?.toMillis?.() || 0;
      return ta - tb;
    });

    const isFirstLoad = prevCount === -1;
    prevCount = docs.length;

    list.innerHTML = docs.map((doc, i) => {
      const d = doc.data();
      const name = d.name || '匿名';
      const initials = name.slice(0,2).toUpperCase();
      const ts = d.createdAt?.toDate ? formatTs(d.createdAt.toDate()) : '—';
      const isLatest = !isFirstLoad && i === docs.length - 1;
      return `
        <div class="comment-item${isLatest ? ' is-new' : ''}">
          <div class="comment-header">
            <div class="comment-av">${escHtml(initials)}</div>
            <div class="comment-name">${escHtml(name)}</div>
            <div class="comment-ts">${ts}</div>
          </div>
          <div class="comment-body">${escHtml(d.message)}</div>
        </div>`;
    }).join('');

    if (!isFirstLoad) {
      const lastEl = list.lastElementChild;
      if (lastEl) lastEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });
}

function formatTs(date) {
  return date.toLocaleDateString('ja-JP', { month:'2-digit', day:'2-digit' }).replace('/','.') +
    ' ' + date.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
}

// ── コメント投稿 ──
async function submitComment() {
  if (!currentPostId) return;
  const now = Date.now();
  const rateLimitEl = document.getElementById('rate-limit-msg');
  if (now - lastCommentTime < RATE_LIMIT_MS) {
    const remaining = Math.ceil((RATE_LIMIT_MS - (now - lastCommentTime)) / 1000);
    rateLimitEl.textContent = `${remaining}秒後に再送信できます`;
    rateLimitEl.style.display = 'block';
    return;
  }
  rateLimitEl.style.display = 'none';

  const name = document.getElementById('comment-name').value.trim() || '匿名';
  const message = document.getElementById('comment-msg').value.trim();
  if (!message) return;
  if (!window._firebaseReady) return;

  const btn = document.getElementById('comment-submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    await window._addDoc(window._collection(window._db, 'comments'), {
      postId: currentPostId,
      name,
      message,
      createdAt: window._serverTimestamp()
    });
    document.getElementById('comment-msg').value = '';
    lastCommentTime = Date.now();
  } catch (e) {
    alert('送信に失敗しました。もう一度お試しください。');
  } finally {
    btn.disabled = false;
    btn.textContent = '送信';
  }
}

// ── BBS ──
let bbsUnsubscribe = null;
let bbsInitialized = false;

function initBbs() {
  if (bbsInitialized) return;
  bbsInitialized = true;
  if (!window._firebaseReady) {
    window.addEventListener('firebaseReady', loadBbs, { once: true });
    return;
  }
  loadBbs();
}

function loadBbs() {
  const q = window._query(
    window._collection(window._db, 'bbs'),
    window._orderBy('createdAt', 'desc')
  );

  let prevCount = -1;
  bbsUnsubscribe = window._onSnapshot(q, (snapshot) => {
    const list = document.getElementById('bbs-list');
    if (!list) return;

    if (snapshot.empty) {
      list.innerHTML = '<div class="bbs-empty">まだ書き込みがありません。最初のメッセージを書いてみよう！</div>';
      prevCount = 0;
      return;
    }

    const isFirstLoad = prevCount === -1;
    prevCount = snapshot.docs.length;

    // 番号は新しい順なので全体数から計算
    const total = snapshot.docs.length;
    list.innerHTML = snapshot.docs.map((doc, i) => {
      const d = doc.data();
      const num = total - i;
      const name = d.name || '匿名';
      const ts = d.createdAt?.toDate ? formatTsBbs(d.createdAt.toDate()) : '—';
      const isLatest = !isFirstLoad && i === 0;
      return `
        <div class="bbs-item${isLatest ? ' is-new' : ''}">
          <div class="bbs-item-header">
            <div class="bbs-num">#${num}</div>
            ${d.title ? `<div class="bbs-item-title">${escHtml(d.title)}</div>` : ''}
          </div>
          <div class="bbs-meta">
            <div class="bbs-meta-item">HANDLE:<span>${escHtml(name)}</span></div>
            <div class="bbs-meta-item">DATE:<span>${ts}</span></div>
          </div>
          <div class="bbs-msg">${escHtml(d.message)}</div>
        </div>`;
    }).join('');
  });
}

function formatTsBbs(date) {
  return date.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' }) +
    '　' + date.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
}

async function submitBbs() {
  const now = Date.now();
  const rateLimitEl = document.getElementById('bbs-rate-limit');
  if (now - lastBbsTime < RATE_LIMIT_MS) {
    const remaining = Math.ceil((RATE_LIMIT_MS - (now - lastBbsTime)) / 1000);
    rateLimitEl.textContent = `${remaining}秒後に再投稿できます`;
    rateLimitEl.style.display = 'block';
    return;
  }
  rateLimitEl.style.display = 'none';

  const title = '';
  const name = document.getElementById('bbs-name-input').value.trim() || '匿名';
  const message = document.getElementById('bbs-msg-input').value.trim();
  if (!message) return;
  if (!window._firebaseReady) return;

  const btn = document.getElementById('bbs-submit-btn');
  btn.disabled = true;
  btn.textContent = '...';

  try {
    await window._addDoc(window._collection(window._db, 'bbs'), {
      title,
      name,
      message,
      createdAt: window._serverTimestamp()
    });
    document.getElementById('bbs-msg-input').value = '';
    lastBbsTime = Date.now();
  } catch (e) {
    alert('送信に失敗しました。もう一度お試しください。');
  } finally {
    btn.disabled = false;
    btn.textContent = 'POST';
  }
}

// ── ライトボックス ──
let lbImages = [], lbIndex = 0;
function openLightbox(e, postIdx, imgIdx) {
  e.stopPropagation();
  const { imageUrls } = getPostData(allPosts[postIdx]);
  lbImages = imageUrls; lbIndex = imgIdx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function updateLightbox() {
  document.getElementById('lightbox-img').src = lbImages[lbIndex];
  document.getElementById('lightbox-counter').textContent = lbImages.length > 1 ? `${lbIndex+1} / ${lbImages.length}` : '';
  document.querySelector('.lightbox-prev').style.display = lbImages.length > 1 ? '' : 'none';
  document.querySelector('.lightbox-next').style.display = lbImages.length > 1 ? '' : 'none';
}
function lbNav(dir) { lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length; updateLightbox(); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
function closeLightboxOutside(e) { if (e.target === document.getElementById('lightbox')) closeLightbox(); }
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft') lbNav(-1);
});

window.tryLogin = tryLogin;
